<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="add_task.css">
    <link rel="stylesheet" type="text/css" href="../main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../styles/footer_mobile.css">
    <link rel="stylesheet" href="../styles/header_mobile.css">
    <title>Add Task</title>
</head>

<body onload="includeHTML()">
    
    <div class="body-frame">
        <header style="position: fixed; top: 0;" include-html="../templates/header.html"></header>
         <main>
             <!--------------- ------------------------->
             <section class="add_task_section">
                <form onsubmit="addTask(); return false;">
                    <div class="title-div">
                        <input type="text" id="title" class="title" placeholder="Enter a title" required>
                    </div>
        
                    <div class="description-div">
                        <b>Description</b>
                        <input type="text" id="description" class="description" placeholder="Enter Description" required>
                    </div>
        
                    <div class="date-container">
                        <b>Due date</b>
                        <div class="date-div">
                          <input type="date" name="Date" id="date" required>
                          <i for="date" class="bi bi-calendar"></i>
                        </div>
                       </div>
        
        
        
                        <div class="assigned-div">
                            <span>Select contact to assign
                                <i class="bi bi-caret-down-fill" id="caret-down" onclick="showOptions()"></i>
                            </span>
        
                            <div id="dropdown-options" class="dropdown-content d-none">
                                <div class="options">
                                    <span class="profile" id="profile">KL</span>
                                    <label for="checkboc">Karwan</label>
                                    <input type="checkbox" id="checkboc" value="KL">
                                </div>
                            </div>
                        </div>
        
        
                    
                    <div class="categoriy-div" id="categoriy-div">
                        <b>Category</b>
                        <select name="Select task Cate" id="category" required>
                            <option value="design">design</option>
                        </select>
        
                        <div class="icon-conatiner">
                            <i class="bi bi-caret-down-fill"></i>
                        </div>
                    </div>
        
                    
                    <div class="prio">
                        <b>Prio</b>
                        <div class="prio-values">
                            <span>Urgent <i class="bi bi-chevron-double-up" id="bi bi-chevron-double-up"></i></span>
                            <span>Medium  <p class="bi equal-sign" id="equal-sign">=</p></span>
                            <span>Low <i class="bi bi-chevron-double-down" id="bi-chevron-double-down"></i> </span>
                        </div>
                    </div>
        
                    <label for="subtaks">Subtasks</label>
                    <div>
                        <input type="text" id="subtaks" placeholder="Add new subtask" required>  
                        <i class="bi bi-x"></i>
                    </div>
                              
                </form>
            </section>
 
            
         </main>
         <footer include-html="../templates/footer.html">
         </footer>
     </div> 
     <script src="add_task.js"></script>
     <script src="../templates/include-html.js"></script>
<body>


</html>
