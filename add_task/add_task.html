<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="add_task.css">
    <link rel="stylesheet" type="text/css" href="../main.css">
    <link rel="stylesheet" href="/styles/header_mobile.css">
    <link rel="stylesheet" href="../styles/footer_mobile.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../styles/footer_mobile.css">
    <link rel="stylesheet" href="../styles/header_mobile.css">
    <link rel="stylesheet" href="../style.css">
    <title>Add Task</title>
</head>

<body onload="includeHTML()">
    
    <div class="body-frame">
        <header include-html="../templates/header.html"></header>
         <main class="add-task-main">
             <!--------------- ------------------------->
             <section class="add_task_section">
                <form onsubmit="addTask(); return false;">
                <div class="first-div">
                    <div class="title-div">
                        <input type="text" id="title" class="title" placeholder="Enter a title" required>
                    </div>
        
                    <div class="description-div">
                        <b>Description</b>
                        <input type="text" id="description" class="description" placeholder="Enter Description" required>
                    </div>
        
                    <div class="date-container">
                        <b>Due date</b>
                        <div class="date-div">
                          <input type="date" name="Date" id="date" required>
                          <i for="date" class="bi bi-calendar"></i>
                        </div>
                       </div>
        
        
        
                        <div class="assigned-div">
                            <span id="assigned-div">Select contact to assign
                                <i class="bi bi-caret-down-fill" id="caret-down" onclick="showOptions()"></i>
                            </span>
        
                            <div id="dropdown-options" class="dropdown-content d-none">
            
                            </div>

                            <div class="selected-contact d-none" id="selected-contact">
                                
                            </div>
                        </div>
        
        
                    
                    <div class="category-div" id="category-div">
                        <b>Category</b>
                        <div class="select-container">
                            <select name="Select" id="category" required onclick="rotateIcon()">
                                <option disabled selected>Select task Category</option>
                                <option value="design">Design</option>
                                <option value="programming">Programming</option>
                                <option value="marketing">Marketing</option> <!-- Du hattest einen Tippfehler in "Marketinf" -->
                            </select>
                            <i class="bi bi-caret-down-fill" id="category-caret-down"></i>
                        </div>
                    </div>
                </div>

                    <div class="line"></div>
                        
                <div class="second-div">
                    <div class="prio">
                        <b>Prio</b>
                        <div class="prio-values">
                            <span onclick="setPrio('urgent')">Urgent <i class="bi bi-chevron-double-up" id="bi bi-chevron-double-up"></i></span>
                            <span onclick="setPrio('medium')">Medium<p class="bi equal-sign" id="equal-sign">=</p></span>
                            <span onclick="setPrio('low')">Low <i class="bi bi-chevron-double-down" id="bi-chevron-double-down"></i> </span>
                        </div>
                    </div>
        
                    
                        <div style="padding: 0;" class="subtask-container" id="subtask-container">
                            <div class="subtask" id="subtask">
                                <b>Subtasks</b>
                                <div class="subtask-wrapper" id="subtask-wrapper">
                                    <input onclick="openAddTask()" type="text" id="subtask-value" placeholder="Add new subtask" required>  
                                </div>
                            </div>
                        </div>

                        
                        <div class="btns-container form-btns">
                            <button id="create-task" class="create-task" onclick="addAnTask()">
                                <span>Create Task</span>
                                <i class="bi bi-check-lg"></i>
                            </button>

                            <button id="clear-task" class="create-task clear-btn" onclick="clearAnTask()">
                                <span>Clear</span>
                                <i class="bi bi-x-lg"></i>
                            </button>
                        </div>
                      
                    </div>
                </form>
            </section>

            <div class="btns-container main-btns-container">
                <button class="create-task" onclick="activeCreateTaskBtn()">
                    <span>Create Task</span>
                    <i class="bi bi-check-lg"></i>
                </button>

                <button class="create-task clear-btn" onclick="activeClearTaskBtn()">
                    <span>Clear</span>
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
           </main>
        </div>
                    
         <footer include-html="../templates/footer.html">
         </footer>
     </div> 
     <script src="../templates/global_arrays.js"></script>
     <script src="add_task.js"></script>
     <script src="../templates/include-html.js"></script>
<body>


</html>
