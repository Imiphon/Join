<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
        <link rel="stylesheet" href="contacts/contacts.html">
    <script src="contacts/contacts.js"></script>
-->
    <title>contacts</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
        }

        .contacts-frame {
            width: 428px;
            height: 99vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: rgb(69, 137, 255);
            width: 100%; /* in mockup: 428px*/
            height: 80px;
            /* in mockup: padding: 20px 25px 20px 25px;*/
            z-index: 10;
            display: flex;
            justify-content: space-between;

        }

        main {
            background-color: rgb(255, 255, 255);
            width: 100%;
            height: auto;
            display: flex;
            flex: 1;
            justify-content: flex-start;
            align-items: center;
            flex-direction: column;
        }

        footer {
            background-color: rgb(69, 137, 255);
            width: 100%;
            height: 80px;
            z-index: 10;
        }
        .letter-box {
            width: 352px;
            height: 56px;
            padding: 17px 36px 17px 36px;
            gap: 8px;
        }
        .line-box {
            Width: 352px;
            Height: 16px;
            Padding: 8px, 0px, 8px, 0px;
            Gap: 10px;
        }
        .line {
            width: 352px;
            height: 1px;
            background-color: #D1D1D1;
            border: 1px;
        }
    </style>

</head>

<body>
    <div class="contacts-frame">
        <header></header>
        <main>
            <div class="letter-box" id="letterBox"></div>
            <div class="line-box">
                <div class="line"></div>
            </div>
            <div class="name-box" id="nameBox"></div>

        </main>
        <footer></footer>
    </div>

</body>

</html>
