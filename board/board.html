<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Board</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.css"
    />
    <link rel="stylesheet" href="../styles/header_mobile.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../styles/footer_mobile.css" />
    <link rel="stylesheet" href="board.css" />
    <link rel="stylesheet" href="../main.css" />
    <link rel="stylesheet" href="../style.css" />
  </head>

  <body onload="includeHTML(), init()">
    <div class="body-frame board-frame">
      <header include-html="../templates/header.html"></header>
      <main class="board-main">
        <div class="search-bar" id="search-bar">
          <input type="search" name="search" id="search" />
          |
          <i class="bi-search"></i>
        </div>

        <section class="tasks" id="tasks">
          <div class="card-parent">
            <div class="row-title">
              <b>To do</b>
              <i class="bi bi-plus-lg"></i>
            </div>

            <div class="allsTsks" id="toDo"></div>
          </div>

          <div class="card-parent">
            <div class="row-title">
              <b>In progress</b>
              <i class="bi bi-plus-lg"></i>
            </div>

            <div class="allsTsks" id="inProgress"></div>
          </div>

          <div class="card-parent">
            <div class="row-title">
              <b>Await feedback</b>
              <i class="bi bi-plus-lg"></i>
            </div>

            <div class="allsTsks" id="awaitFeedback"></div>
          </div>
        </section>
      </main>
      <footer include-html="../templates/footer.html"></footer>
    </div>

    <script src="../templates/include-html.js"></script>
    <script src="../templates/global_arrays.js"></script>
    <script src="board.js"></script>
  </body>
</html>
