<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <link rel="stylesheet" href="./fonts.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/header_mobile.css">
    <script src="templates/global_arrays.js" defer></script>
</head>

    <body>
        <div class="logoDivHeaderMobile">
            <img src="../assets/img/logo_mobile_blue.svg" alt="join logo">
        </div>

        <form class="login" onsubmit="login(); return false;">
            <div class="w-100">
                <input style="background-image: url('./assets/img/login-mail.svg')" class="loginInput" required type="email" id="email" placeholder="Email">
                <div class="line"></div>
            </div>
            <div class="w-100">
                <input style="background-image: url('./assets/img/login-lock.svg')" class="loginInput" required type="password" id="password" placeholder="Password">
                <div class="line"></div>
            </div>
            <div class="loginOptions">
                <div>
                    <button class="loginBtn btnTxtBlue">Forgot my Password</button>
                </div>
                <div class="rememberMe">
                    <input type="checkbox" id="rememberMe"> 
                    <p>Remember me</p>
                </div>
            </div>
            <button class="loginBtn btnBlue" id="userLoginBtn">Log in</button>
            <button class="loginBtn btnWhite" id="guestLoginBtn">Guest Log in</button>
        </form> 
    </body>
</html>
